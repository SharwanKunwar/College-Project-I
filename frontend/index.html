<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusPlanner — Stay in Flow</title>
    <meta name="description"
        content="FocusPlanner: A beautiful task management app. Organize your day, track progress, and stay productive." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ─── AUTH SCREENS ──────────────────────────────────────────────────── -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-bg">
            <div class="auth-blob blob1"></div>
            <div class="auth-blob blob2"></div>
            <div class="auth-blob blob3"></div>
        </div>

        <div class="auth-card glass">
            <!-- Logo / Brand -->
            <div class="auth-brand">
                <div class="brand-icon">
                    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                        <circle cx="18" cy="18" r="18" fill="url(#grad1)" />
                        <path d="M11 18l5 5 9-9" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="grad1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#6C63FF" />
                                <stop offset="1" stop-color="#48cae4" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="brand-name">FocusPlanner</span>
            </div>

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="showTab('login')">Sign In</button>
                <button id="tab-register" class="auth-tab" onclick="showTab('register')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)" action="/api/auth/login"
                method="post">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-with-icon">
                        <input id="login-password" type="password" placeholder="••••••••" required
                            autocomplete="current-password" />
                        <button type="button" class="eye-btn"
                            onclick="togglePassword('login-password', this)">👁</button>
                    </div>
                </div>
                <div id="login-error" class="auth-error hidden"></div>
                <button type="submit" id="login-btn" class="btn-primary btn-full">
                    <span>Sign In</span>
                    <div class="btn-spinner hidden"></div>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)"
                action="/api/auth/register" method="post">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input id="reg-name" type="text" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <div class="input-with-icon">
                        <input id="reg-password" type="password" placeholder="Min. 6 characters" required
                            minlength="6" />
                        <button type="button" class="eye-btn" onclick="togglePassword('reg-password', this)">👁</button>
                    </div>
                </div>
                <div id="register-error" class="auth-error hidden"></div>
                <button type="submit" id="register-btn" class="btn-primary btn-full">
                    <span>Create Account</span>
                    <div class="btn-spinner hidden"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- ─── MAIN APP ──────────────────────────────────────────────────────── -->
    <div id="app-screen" class="app-screen hidden">

        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-brand">
                <div class="brand-icon small">
                    <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
                        <circle cx="18" cy="18" r="18" fill="url(#grad2)" />
                        <path d="M11 18l5 5 9-9" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="grad2" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#6C63FF" />
                                <stop offset="1" stop-color="#48cae4" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span>FocusPlanner</span>
            </div>

            <nav class="sidebar-nav">
                <button id="nav-dashboard" class="nav-item active" onclick="showView('dashboard')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>
                    Dashboard
                </button>
                <button id="nav-today" class="nav-item" onclick="showView('today')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Today
                </button>
                <button id="nav-tomorrow" class="nav-item" onclick="showView('tomorrow')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    Tomorrow
                </button>
                <button id="nav-later" class="nav-item" onclick="showView('later')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                    Later
                </button>
                <button id="nav-all" class="nav-item" onclick="showView('all')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6" />
                        <line x1="8" y1="12" x2="21" y2="12" />
                        <line x1="8" y1="18" x2="21" y2="18" />
                        <line x1="3" y1="6" x2="3.01" y2="6" />
                        <line x1="3" y1="12" x2="3.01" y2="12" />
                        <line x1="3" y1="18" x2="3.01" y2="18" />
                    </svg>
                    All Tasks
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-pill" id="user-pill">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span id="user-name-display">User</span>
                </div>
                <button class="logout-btn" onclick="handleLogout()" title="Sign Out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="content-header">
                <div class="header-left">
                    <h1 id="view-title">Dashboard</h1>
                    <p id="view-subtitle" class="subtitle">Here's your focus overview for today</p>
                </div>
                <div class="header-right">
                    <button class="btn-primary" onclick="openTaskModal()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        New Task
                    </button>
                </div>
            </header>

            <!-- Dashboard View -->
            <section id="view-dashboard" class="view active">
                <div class="stats-grid">
                    <div class="stat-card glass" data-color="purple">
                        <div class="stat-icon">📋</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-total">–</span>
                            <span class="stat-label">Total Tasks</span>
                        </div>
                        <div class="stat-ring"></div>
                    </div>
                    <div class="stat-card glass" data-color="amber">
                        <div class="stat-icon">⏳</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-pending">–</span>
                            <span class="stat-label">Pending</span>
                        </div>
                        <div class="stat-ring"></div>
                    </div>
                    <div class="stat-card glass" data-color="blue">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-progress">–</span>
                            <span class="stat-label">In Progress</span>
                        </div>
                        <div class="stat-ring"></div>
                    </div>
                    <div class="stat-card glass" data-color="green">
                        <div class="stat-icon">✅</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-completed">–</span>
                            <span class="stat-label">Completed</span>
                        </div>
                        <div class="stat-ring"></div>
                    </div>
                </div>

                <div class="dashboard-bottom">
                    <div class="quick-section">
                        <div class="section-header">
                            <h2>Today's Tasks</h2>
                            <span class="badge" id="today-count-badge">–</span>
                        </div>
                        <div id="dashboard-today-list" class="task-list mini">
                            <div class="skeleton-list">
                                <div class="skeleton"></div>
                                <div class="skeleton"></div>
                                <div class="skeleton"></div>
                            </div>
                        </div>
                    </div>
                    <div class="quick-section">
                        <div class="section-header">
                            <h2>In Progress</h2>
                        </div>
                        <div id="dashboard-progress-list" class="task-list mini">
                            <div class="skeleton-list">
                                <div class="skeleton"></div>
                                <div class="skeleton"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Task List View (Today / Tomorrow / Later / All) -->
            <section id="view-tasks" class="view hidden">
                <!-- Filter bar -->
                <div class="filter-bar glass">
                    <div class="filter-group">
                        <select id="filter-status" onchange="applyFilters()">
                            <option value="">All Statuses</option>
                            <option value="PENDING">Pending</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="COMPLETED">Completed</option>
                        </select>
                        <select id="filter-priority" onchange="applyFilters()">
                            <option value="">All Priorities</option>
                            <option value="HIGH">High</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="LOW">Low</option>
                        </select>
                    </div>
                    <button class="btn-ghost" onclick="resetFilters()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="1 4 1 10 7 10" />
                            <path d="M3.51 15a9 9 0 1 0 .49-3.5" />
                        </svg>
                        Reset
                    </button>
                </div>

                <div id="tasks-container" class="tasks-container">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ─── TASK MODAL ────────────────────────────────────────────────────── -->
    <div id="task-modal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
        <div class="modal glass" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 id="modal-title">New Task</h2>
                <button class="modal-close" onclick="closeTaskModal()" aria-label="Close">&times;</button>
            </div>
            <form id="task-form" onsubmit="handleTaskSubmit(event)" class="modal-body">
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="task-title">Title <span class="req">*</span></label>
                        <input id="task-title" type="text" placeholder="e.g. Finish project report" required
                            maxlength="100" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-description">Description <span class="req">*</span></label>
                    <textarea id="task-description" placeholder="Briefly describe this task..." required maxlength="300"
                        rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="task-priority">Priority <span class="req">*</span></label>
                        <select id="task-priority" required>
                            <option value="" disabled selected>Select priority</option>
                            <option value="HIGH">🔴 High</option>
                            <option value="MEDIUM">🟡 Medium</option>
                            <option value="LOW">🟢 Low</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label for="task-forwhen">Schedule For <span class="req">*</span></label>
                        <select id="task-forwhen" required>
                            <option value="" disabled selected>Select when</option>
                            <option value="TODAY">📅 Today</option>
                            <option value="TOMORROW">⏭ Tomorrow</option>
                            <option value="LATER">🔮 Later</option>
                        </select>
                    </div>
                </div>
                <div id="task-modal-error" class="auth-error hidden"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-ghost" onclick="closeTaskModal()">Cancel</button>
                    <button type="submit" id="task-submit-btn" class="btn-primary">
                        <span id="task-btn-label">Create Task</span>
                        <div class="btn-spinner hidden"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ─── COMPLETE MODAL ────────────────────────────────────────────────── -->
    <div id="complete-modal" class="modal-overlay hidden" onclick="closeCompleteModalOnOverlay(event)">
        <div class="modal glass small" role="dialog" aria-modal="true">
            <div class="modal-header">
                <h2>Complete Task ✅</h2>
                <button class="modal-close" onclick="closeCompleteModal()" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="task-note">Add a completion note (optional)</label>
                    <textarea id="task-note" placeholder="What did you accomplish? Any learnings?" rows="4"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn-ghost" onclick="closeCompleteModal()">Cancel</button>
                    <button class="btn-primary" onclick="submitComplete()">
                        Mark Complete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── TOAST ────────────────────────────────────────────────────────── -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
